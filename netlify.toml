# Netlify configuration for Om Wan website
[build]
  base = "om-wan-web"
  command = "npm install && npm run build"
  publish = "dist"

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
